name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-deny
        if: runner.os == 'Linux'
        run: cargo install cargo-deny --version 0.20.2 --locked

      - name: Check dependencies
        if: runner.os == 'Linux'
        run: cargo deny check

  linux-musl:
    name: Linux static-musl artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain and target
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup target add x86_64-unknown-linux-musl --toolchain 1.97.0

      - name: Build release artifacts
        run: cargo build --release --target x86_64-unknown-linux-musl --workspace

      - name: Verify static Linux linkage
        shell: bash
        run: |
          binaries=(
            target/x86_64-unknown-linux-musl/release/dbx-rs-daemon
            target/x86_64-unknown-linux-musl/release/dbx-rs-connector-postgres
          )
          for binary in "${binaries[@]}"; do
            file "$binary"
            if readelf -l "$binary" | grep -q 'INTERP'; then
              echo "$binary has a dynamic program interpreter"
              exit 1
            fi
            if readelf -d "$binary" | grep -q 'NEEDED'; then
              echo "$binary has dynamic library dependencies"
              exit 1
            fi
          done
          target/x86_64-unknown-linux-musl/release/dbx-rs-daemon --version
          target/x86_64-unknown-linux-musl/release/dbx-rs-connector-postgres --help >/dev/null
