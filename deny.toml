[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]

[advisories]
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
skip = [
    { crate = "const-oid@0.9.6", reason = "tokio-postgres-rustls uses x509-cert on const-oid 0.9 while postgres-protocol uses digest on const-oid 0.10" },
    { crate = "getrandom@0.2.17", reason = "Rustls ring uses getrandom 0.2 while tokio-postgres uses rand on getrandom 0.4" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
